on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create_issue.outputs.issue_number }}
      previous_commit: ${{ steps.get_previous_commit.outputs.previous_commit }}
      current_commit: ${{ steps.get_current_commit.outputs.current_commit }}
      package_version: ${{ steps.get_package_version.outputs.package_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Get previous commit SHA
        id: get_previous_commit
        run: echo "previous_commit=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get current commit SHA
        id: get_current_commit
        run: echo "current_commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: get_package_version
        run: echo "package_version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${{ steps.get_current_commit.outputs.current_commit }}`,
              labels: ['deployment', 'in-progress'],
              body: `
              Deployment tracking issue for commit ${{ steps.get_current_commit.outputs.current_commit }}.
              Previous commit: ${{ steps.get_previous_commit.outputs.previous_commit }}
              Package version: ${{ steps.get_package_version.outputs.package_version }}
              `
            });
            return issue.number;
          result-encoding: string

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create_issue.outputs.issue_number }},
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      artifact_name: ${{ steps.create_artifact.outputs.artifact_name }}
      sha256_checksum: ${{ steps.generate_checksum.outputs.sha256_checksum }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create rollback directory
        run: mkdir -p rollback-artifacts

      - name: Create rollback script
        run: |
          cat > rollback-artifacts/rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          # Rollback script for Node.js deployment
          PREVIOUS_COMMIT="${{ needs.pre-deployment.outputs.previous_commit }}"
          CURRENT_COMMIT="${{ needs.pre-deployment.outputs.current_commit }}"
          PACKAGE_VERSION="${{ needs.pre-deployment.outputs.package_version }}"

          echo "Starting rollback from $CURRENT_COMMIT to $PREVIOUS_COMMIT"

          # Verify git repository
          if ! git rev-parse --is-inside-work-tree > /dev/null 2>&1; then
            echo "Error: Not in a git repository"
            exit 1
          fi

          # Check if previous commit exists
          if ! git cat-file -e "$PREVIOUS_COMMIT^{commit}"; then
            echo "Error: Previous commit $PREVIOUS_COMMIT does not exist"
            exit 1
          fi

          # Restore previous commit
          echo "Restoring previous commit: $PREVIOUS_COMMIT"
          git checkout "$PREVIOUS_COMMIT"

          # Restore dependencies
          echo "Restoring dependencies from package-lock.json"
          npm ci

          # Verify package version
          RESTORED_VERSION=$(jq -r .version package.json)
          if [ "$RESTORED_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Warning: Restored package version $RESTORED_VERSION does not match expected $PACKAGE_VERSION"
          fi

          echo "Rollback completed successfully to $PREVIOUS_COMMIT"
          EOF
          chmod +x rollback-artifacts/rollback.sh

      - name: Create configuration backups
        run: |
          cp package.json rollback-artifacts/package.json.backup
          cp package-lock.json rollback-artifacts/package-lock.json.backup
          if [ -f .env.example ]; then
            cp .env.example rollback-artifacts/.env.example.backup
          fi

      - name: Create dependency verification script
        run: |
          cat > rollback-artifacts/verify-dependencies.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          # Dependency verification script for rollback
          echo "Verifying dependency compatibility..."

          # Check for npm
          if ! command -v npm &> /dev/null; then
            echo "Error: npm is not installed"
            exit 1
          fi

          # Verify package-lock.json integrity
          echo "Verifying package-lock.json integrity..."
          npm ci --dry-run

          # Check for vulnerable dependencies
          echo "Checking for vulnerable dependencies..."
          npm audit --audit-level moderate

          echo "Dependency verification completed successfully"
          EOF
          chmod +x rollback-artifacts/verify-dependencies.sh

      - name: Create rollback documentation
        run: |
          cat > rollback-artifacts/ROLLBACK_GUIDE.md << 'EOF'
          # Rollback Guide for Deployment ${{ needs.pre-deployment.outputs.current_commit }}

          ## Overview
          This guide provides step-by-step instructions to rollback from commit ${{ needs.pre-deployment.outputs.current_commit }} to ${{ needs.pre-deployment.outputs.previous_commit }}.

          ## Prerequisites
          - Git installed
          - Node.js ${{ steps.setup-node.outputs.node-version }} installed
          - npm installed
          - Access to the repository

          ## Rollback Steps
          1. **Navigate to the repository directory**
             ```bash
             cd /path/to/repository
             ```

          2. **Run the automated rollback script**
             ```bash
             ./rollback-artifacts/rollback.sh
             ```

          3. **Verify the rollback**
             ```bash
             # Check current commit
             git rev-parse HEAD
             # Verify package version
             jq -r .version package.json
             # Run tests
             npm test
             ```

          4. **Restart the application**
             ```bash
             # Example: If using PM2
             pm2 restart app
             # Example: If using systemd
             sudo systemctl restart your-app.service
             ```

          ## Manual Rollback (If script fails)
          1. **Checkout previous commit**
             ```bash
             git checkout ${{ needs.pre-deployment.outputs.previous_commit }}
             ```

          2. **Restore dependencies**
             ```bash
             npm ci
             ```

          3. **Restore configuration files**
             ```bash
             cp rollback-artifacts/package.json.backup package.json
             cp rollback-artifacts/package-lock.json.backup package-lock.json
             if [ -f rollback-artifacts/.env.example.backup ]; then
               cp rollback-artifacts/.env.example.backup .env.example
             fi
             ```

          4. **Verify and restart**
             Follow steps 3-4 from automated rollback.

          ## Support
          For issues, contact the DevOps team.
          EOF

      - name: Create compressed rollback package
        id: create_artifact
        run: |
          ARTIFACT_NAME="rollback-package-${{ needs.pre-deployment.outputs.current_commit }}"
          zip -r "$ARTIFACT_NAME.zip" rollback-artifacts/
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksum
        id: generate_checksum
        run: |
          CHECKSUM=$(sha256sum ${{ steps.create_artifact.outputs.artifact_name }}.zip | awk '{print $1}')
          echo "sha256_checksum=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Upload rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_artifact.outputs.artifact_name }}
          path: ${{ steps.create_artifact.outputs.artifact_name }}.zip
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `
              # 🔄 Rollback Plan Ready

              Previous Commit: ${{ needs.pre-deployment.outputs.previous_commit }}
              Current Commit: ${{ needs.pre-deployment.outputs.current_commit }}
              Package Version: ${{ needs.pre-deployment.outputs.package_version }}
              Artifact: ${{ steps.create_artifact.outputs.artifact_name }}

              ✅ Automated rollback script created
              ✅ Configuration files backed up
              ✅ Dependency verification script created
              ✅ Rollback documentation generated
              ✅ Compressed rollback package created

              ## Quick Rollback Command
              \`\`\`bash
              # Download and extract the rollback artifact
              gh run download ${{ github.run_id }} -n ${{ steps.create_artifact.outputs.artifact_name }}
              unzip ${{ steps.create_artifact.outputs.artifact_name }}.zip

              # Run the rollback script
              chmod +x rollback-artifacts/rollback.sh
              ./rollback-artifacts/rollback.sh
              \`\`\`

              Rollback script created: true
              Configuration backup: true
              SHA256: ${{ steps.generate_checksum.outputs.sha256_checksum }}
              `
            });

  post-deployment:
    runs-on: ubuntu-latest
    needs: rollback-preparation
    steps:
      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              name: 'in-progress'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              labels: ['completed']
            });

      - name: Post final deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `
              # Deployment Completed Successfully

              Deployment for commit ${{ needs.pre-deployment.outputs.current_commit }} has been completed successfully.

              ## Rollback Information
              - Rollback artifact: ${{ needs.rollback-preparation.outputs.artifact_name }}
              - SHA256 checksum: ${{ needs.rollback-preparation.outputs.sha256_checksum }}
              - Previous commit: ${{ needs.pre-deployment.outputs.previous_commit }}
              - Package version: ${{ needs.pre-deployment.outputs.package_version }}

              The rollback artifact is available for 30 days in the GitHub Actions artifacts section of this run.
              `
            });

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              state: 'closed'
            });
